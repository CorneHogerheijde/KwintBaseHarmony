<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KwintBaseHarmony — Register</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/styles.css">
    <script src="/app-config.js"></script>
</head>
<body>
    <div class="page-shell auth-shell">

        <main class="auth-card panel">
            <p class="eyebrow">KwintBaseHarmony</p>
            <h1>Create account</h1>
            <p class="lede">Register to save your progress across devices.</p>

            <form id="register-form" class="stacked-form">
                <label>
                    Email
                    <input id="email-input" type="email" autocomplete="email" required placeholder="you@example.com">
                </label>
                <label>
                    Password <span class="label-hint">(min. 8 characters)</span>
                    <input id="password-input" type="password" autocomplete="new-password" required placeholder="••••••••" minlength="8">
                </label>
                <label>
                    I am a
                    <select id="role-select">
                        <option value="Student" selected>Student</option>
                        <option value="Educator">Educator</option>
                    </select>
                </label>
                <p id="register-error" class="home-error hidden"></p>
                <button type="submit" class="primary-button">Create account →</button>
            </form>

            <p class="auth-switch-link">Already have an account? <a href="/login.html">Log in</a></p>
            <p class="auth-switch-link"><a href="/">Home</a></p>
        </main>

    </div>
    <script type="module" src="/register.js"></script>
</body>
</html>
