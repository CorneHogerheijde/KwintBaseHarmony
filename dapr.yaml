version: 1
common:
  resourcesPath: ./src/backend/components
apps:
  - appID: kwintbaseharmony-api
    appDirPath: ./src/backend
    appProtocol: http
    appPort: 5000
    configFilePath: ../../.dapr/config.yaml
    command:
      - dotnet
      - run
      - --no-launch-profile
      - --urls
      - http://localhost:5000
  - appID: kwintbaseharmony-frontend
    appDirPath: ./src/frontend
    appProtocol: http
    appPort: 5051
    daprHTTPPort: 3510
    daprGRPCPort: 50011
    command:
      - npm
      - run
      - dev