name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            KwintBaseHarmony.sln
            src/backend/KwintBaseHarmony.csproj
            src/frontend/KwintBaseHarmony.Frontend.csproj
            tests/KwintBaseHarmony.Tests.csproj

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Restore dependencies
        run: dotnet restore KwintBaseHarmony.sln

      - name: Build solution
        run: dotnet build KwintBaseHarmony.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test KwintBaseHarmony.sln --configuration Release --no-build --verbosity normal

      - name: Install frontend test dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Run frontend Cypress tests
        working-directory: src/frontend
        run: npm run test:e2e