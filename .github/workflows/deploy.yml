name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'prod'

# Required for OIDC (federated credential) Azure login — no client secret needed.
permissions:
  id-token: write
  contents: read

env:
  ENVIRONMENT_NAME: ${{ github.event.inputs.environment || 'prod' }}

# ── First-time setup ──────────────────────────────────────────────────────────
# 1. Deploy the bootstrap secrets Key Vault (once):
#      az deployment group create \
#        --resource-group <your-rg> \
#        --template-file infra/secrets.bicep \
#        --parameters infra/secrets.bicepparam
#
# 2. Store the PostgreSQL admin password in it:
#      az keyvault secret set \
#        --vault-name kbh-secrets-prod \
#        --name postgres-admin-password \
#        --value '<your-secure-password>'
#
# 3. Fill in YOUR subscription ID and resource group in infra/main.bicepparam's getSecret() call.
#
# 4. Add the following as GitHub Actions repository variables
#    (Settings → Secrets and variables → Actions → Variables):
#   AZURE_CLIENT_ID         — Service principal client ID (with federated credential configured)
#   AZURE_TENANT_ID         — Azure tenant ID
#   AZURE_SUBSCRIPTION_ID  — Azure subscription ID
#   AZURE_RESOURCE_GROUP   — e.g. rg-kwintbaseharmony-prod
#   AZURE_ACR_LOGIN_SERVER — e.g. kbhacrabcd1234.azurecr.io  (from: az acr show --name <name> --query loginServer -o tsv)
#
# No GitHub secrets needed — the PostgreSQL password is resolved from Key Vault via getSecret().

jobs:
  test-bicep:
    name: Validate Bicep snapshot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: |
          curl -Lo /usr/local/bin/bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x /usr/local/bin/bicep
          bicep --version

      - name: Validate snapshot (detect drift)
        run: |
          bicep snapshot infra/main.test.bicepparam --mode validate
          echo "No drift detected."

        # To update the baseline after an intentional change, run locally:
        #   bicep snapshot infra/main.test.bicepparam --mode overwrite
        # then commit infra/main.test.snapshot.json.

  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Container Registry
        run: az acr login --name "${{ vars.AZURE_ACR_LOGIN_SERVER }}"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: src/backend
          file: src/backend/Dockerfile
          push: true
          tags: |
            ${{ vars.AZURE_ACR_LOGIN_SERVER }}/kwintbaseharmony-api:${{ github.sha }}
            ${{ vars.AZURE_ACR_LOGIN_SERVER }}/kwintbaseharmony-api:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: src/frontend
          file: src/frontend/Dockerfile
          push: true
          tags: |
            ${{ vars.AZURE_ACR_LOGIN_SERVER }}/kwintbaseharmony-frontend:${{ github.sha }}
            ${{ vars.AZURE_ACR_LOGIN_SERVER }}/kwintbaseharmony-frontend:latest

  deploy-infra:
    name: Deploy Bicep infrastructure
    runs-on: ubuntu-latest
    needs: [test-bicep, build-and-push]
    outputs:
      frontend_url: ${{ steps.bicep.outputs.frontend_url }}
      backend_url: ${{ steps.bicep.outputs.backend_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # Validate what would change before applying (acts as a dry-run check in the log).
      - name: Bicep what-if (preview changes)
        run: |
          az deployment group what-if \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --parameters environmentName="${{ env.ENVIRONMENT_NAME }}" \
            --parameters backendImageTag="${{ github.sha }}" \
            --parameters frontendImageTag="${{ github.sha }}"

      - name: Deploy Bicep
        id: bicep
        run: |
          OUTPUT=$(az deployment group create \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --parameters environmentName="${{ env.ENVIRONMENT_NAME }}" \
            --parameters backendImageTag="${{ github.sha }}" \
            --parameters frontendImageTag="${{ github.sha }}" \
            --output json)

          FRONTEND_URL=$(echo "$OUTPUT" | jq -r '.properties.outputs.frontendUrl.value')
          BACKEND_URL=$(echo "$OUTPUT" | jq -r '.properties.outputs.backendUrl.value')
          echo "frontend_url=$FRONTEND_URL" >> "$GITHUB_OUTPUT"
          echo "backend_url=$BACKEND_URL" >> "$GITHUB_OUTPUT"

      - name: Deployment summary
        run: |
          echo "### Deployment complete :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Frontend** | ${{ steps.bicep.outputs.frontend_url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Backend**  | ${{ steps.bicep.outputs.backend_url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image tag** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
